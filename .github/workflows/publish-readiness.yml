name: Publish Readiness

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    release-readiness:
        name: Release Readiness Checks
        runs-on: ubuntu-latest
        env:
            FOCUSED_CRATES: >-
                use-sql-ident use-sql-keyword use-sql-dialect use-sql-type use-sql-value use-sql-param use-sql-schema use-sql-table use-sql-column use-sql-operator use-sql-expression use-sql-clause use-sql-query use-sql-constraint
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Install stable Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  rustflags: ""
                  cache-workspaces: |
                      . -> target

            - name: Check examples with all features enabled
              run: cargo check --workspace --all-features --examples

            - name: Test workspace without default features
              run: cargo test --workspace --no-default-features

            - name: Dry-run publish focused crates
              run: |
                  for crate in $FOCUSED_CRATES; do
                    cargo package --list -p "$crate"
                    cargo publish --dry-run --allow-dirty -p "$crate"
                  done
